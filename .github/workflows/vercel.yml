name: Vercel CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy-preview:
    name: Deploy Preview to Vercel
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: frontend-ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} --cwd frontend

      - name: Build project artifacts (preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }} --cwd frontend

      - name: Deploy prebuilt artifacts (preview)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --cwd frontend)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Preview deployment URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Deploy Production to Vercel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: frontend-ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd frontend

      - name: Build project artifacts (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd frontend

      - name: Deploy prebuilt artifacts (production)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd frontend)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Production deployment URL: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
